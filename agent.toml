# Пример конфига агента.

[network]
# Общий белый список IP/CIDR (если у сервера ниже не задан свой allow_ips).
# Пустой список = пускать с любых адресов (для теста).
allow_ips = ["192.168.55.0/24"]

[data]
listen   = "0.0.0.0:8443"
allow_cn = ["obcluster200", "Users"]   # чьи client-cert пускаем читать метрики
# allow_ips = ["192.168.55.0/24"]         # необязательный per-server список

[mgmt]
listen   = "0.0.0.0:9443"
allow_cn = ["obcluster200"]                 # кто может заливать серт
# allow_ips = ["192.168.55.0/24"]        # mgmt можно сузить до управляющих серверов

[oceanbase]
host = "192.168.55.202"
port = 2881
user = "nm_test"
ca   = "./ca.pem"
